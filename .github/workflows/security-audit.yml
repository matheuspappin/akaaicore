name: Security Audit — Multi-tenant Route Protection

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  audit-routes:
    name: Audit API Routes (IDOR / supabaseAdmin without guard)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run route security audit
        run: npx tsx scripts/audit-routes.ts --fix-report

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: scripts/audit-routes-report.json
          retention-days: 30
