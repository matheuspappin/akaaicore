name: Security Audit — Multi-tenant Route Protection

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  audit-routes:
    name: Audit API Routes (IDOR / supabaseAdmin without guard)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit

      - name: Run route security audit
        run: npx tsx scripts/audit-routes.ts --fix-report

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: scripts/audit-routes-report.json
          retention-days: 30
